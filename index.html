<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lunoo - Apprentissage Magique</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
    <style>
        body { 
            margin: 0; padding: 0; height: 100vh; overflow: hidden;
            display: flex; flex-direction: column; align-items: center;
            background: radial-gradient(circle at bottom, #dfdaff 0%, #1a1a2e 100%);
        }
        header { text-align: center; padding: 15px; }
        img { width: 80px; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.5)); border-radius: 50%; }
        h1 { font-family: 'Fredoka One', cursive; color: #a29bfe; margin: 5px 0 0 0; font-size: 24px; }
        
        /* C'est ici qu'on charge l'application Google */
        iframe { width: 100%; flex-grow: 1; border: none; background: transparent; }
    </style>
</head>
<body>

    <header>
        <img src="logo_lunoo.jpg" alt="Lunoo Logo">
        <h1>Lunoo</h1>
    </header>

    <iframe src="https://script.google.com/macros/s/AKfycbzyN1-uDhSO6OpuRDXx-BvK-EqovwaDxYwCA6bd5BMmSe8Pz6ZN7ndicdZK48uvUqAi/exec" allow="camera; microphone; autoplay"></iframe>

</body>
</html>
