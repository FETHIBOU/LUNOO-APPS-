// 🧠 Algorithme de détection des inversions (Dyslexie)
window.detecterInversion = (cible, prononce) => {
    let c = cible.toLowerCase().replace(/[^a-zàâçéèêëîïôûùüÿñæœ\-]/g, '');
    let p = prononce.toLowerCase().replace(/[^a-zàâçéèêëîïôûùüÿñæœ\-]/g, '');
    if (c === p || c.length !== p.length) return false;
    let diffCount = 0; let lettresC = []; let lettresP = [];
    for (let i = 0; i < c.length; i++) {
        if (c[i] !== p[i]) {
            diffCount++; lettresC.push(c[i]); lettresP.push(p[i]);
        }
    }
    if (diffCount === 2 && lettresC[0] === lettresP[1] && lettresC[1] === lettresP[0]) return true;
    return false;
};

window.calculerSimilitude=(s1,s2)=>{let longer=s1;let shorter=s2;if(s1.length<s2.length){longer=s2;shorter=s1;}let longerLength=longer.length;if(longerLength==0)return 100.0;let costs=new Array();for(let i=0;i<=longer.length;i++){let lastValue=i;for(let j=0;j<=shorter.length;j++){if(i==0){costs[j]=j;}else{if(j>0){let newValue=costs[j-1];if(longer.charAt(i-1)!=shorter.charAt(j-1))newValue=Math.min(Math.min(newValue,lastValue),costs[j])+1;costs[j-1]=lastValue;lastValue=newValue;}}}if(i>0)costs[shorter.length]=lastValue;}return((longerLength-costs[shorter.length])/parseFloat(longerLength))*100.0;};

// Fonction utilitaire pour découper un mot (Approche basique pour le Français et l'Arabe)
window.decouperEnSyllabes = (mot) => {
    if (window.currentLang === 'ar') {
        // Pour l'arabe : Sépare visuellement après les voyelles/harakat ou lettres avec soukoun
        return mot.replace(/([^\u064B-\u0652\s]+[\u064B-\u0652]*)/g, "$1 <span style='color:#ccc; margin:0 3px;'>/</span> ");
    } else {
        // Pour le français : Sépare de manière basique (consonne+voyelle)
        return mot.replace(/([^aeiouyéèêâîôû]+[aeiouyéèêâîôû]+)/gi, "$1 <span style='color:#ccc; margin:0 3px;'>/</span> ");
    }
};
window.isSyllabicMode = false;

// Le cerveau de découpage avancé (Corrigé pour les Mad)
window.formaterSyllabes = (motBrut) => {
    let syllabes = [];
    let cleanMot = motBrut.trim();
    if(!cleanMot) return "";

    if (window.currentLang === 'ar') {
        // --- NOUVEL ALGORITHME ARABE (Taqti' intelligent) ---
        // CORRECTION ICI : Suppression du "+" pour forcer la lecture lettre par lettre stricte
        const regexLettre = /([^\u064B-\u065F\s][\u064B-\u065F]*)/g;
        let blocs = cleanMot.match(regexLettre);
        
        if (blocs) {
            let syllabeEnCours = "";
            for (let i = 0; i < blocs.length; i++) {
                let bloc = blocs[i];
                
                // Si c'est le début d'une nouvelle syllabe
                if (syllabeEnCours === "") {
                    syllabeEnCours = bloc;
                    continue;
                }

                // Analyse du bloc actuel
                let aUnSukun = bloc.includes('\u0652'); // Présence d'un Soukoun
                
                // Est-ce une lettre de prolongation (Madd) ?
                let baseChar = bloc.replace(/[\u064B-\u065F]/g, '').trim();
                let nApasDeVoyelle = !(/[\u064B-\u0651\u0653-\u065F]/.test(bloc)); 
                let estLettreMadd = (['ا', 'و', 'ي', 'ى', 'آ'].includes(baseChar) && nApasDeVoyelle);

                // Règle d'assemblage
                if (aUnSukun || estLettreMadd) {
                    // On fusionne avec la syllabe précédente (ex: حَ + ا = حَا)
                    syllabeEnCours += bloc;
                } else {
                    // On ferme la syllabe précédente et on en commence une nouvelle
                    syllabes.push(syllabeEnCours);
                    syllabeEnCours = bloc;
                }
            }
            if (syllabeEnCours !== "") {
                syllabes.push(syllabeEnCours);
            }
        } else {
            syllabes = [cleanMot];
        }

    } else {
        // --- ALGORITHME FRANÇAIS ---
        let regexFR = /([^aeiouyéèêëàâîïôûùüœæ]*[aeiouyéèêëàâîïôûùüœæ]+(?:[^aeiouyéèêëàâîïôûùüœæ](?![aeiouyéèêëàâîïôûùüœæ]))?)/gi;
        let match = cleanMot.match(regexFR);
        syllabes = match ? match : [cleanMot];
    }

    // --- ASSEMBLAGE FINAL AVEC LES COULEURS ---
    let htmlResult = "";
    syllabes.forEach((syl, index) => {
        let colorClass = index % 2 === 0 ? "syllabe-0" : "syllabe-1";
        htmlResult += `<span class="${colorClass}">${syl}</span>`;
        if (index < syllabes.length - 1) {
            htmlResult += `<span class="syllabe-sep">/</span>`;
        }
    });
    return htmlResult;
};
// Le bouton d'activation
window.toggleSyllabic = () => {
    window.isSyllabicMode = !window.isSyllabicMode;
    const btn = document.getElementById('btn-syllabic');
    
    if(window.isSyllabicMode) {
        btn.classList.add('active');
        document.body.classList.add('syllabic-active');
        document.getElementById('status').innerText = "✂️ Mode Syllabes Activé";
        
        document.querySelectorAll('.mot-cliquable').forEach(motSpan => {
            if (!motSpan.dataset.htmlOriginal) motSpan.dataset.htmlOriginal = motSpan.innerHTML;
            // On nettoie les symboles avant de découper
            let texteBrut = motSpan.innerText.replace(/[🛑⏱️]/g,''); 
            motSpan.innerHTML = window.formaterSyllabes(texteBrut);
        });
    } else {
        btn.classList.remove('active');
        document.body.classList.remove('syllabic-active');
        document.getElementById('status').innerText = "Prêt";
        
        // Rétablir le texte normal
        document.querySelectorAll('.mot-cliquable').forEach(motSpan => {
            if (motSpan.dataset.htmlOriginal) motSpan.innerHTML = motSpan.dataset.htmlOriginal;
        });
    }
};

window.loadIA=async()=>{try{if(!FilesetResolver)return;const fr=await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/wasm");window.faceLandmarker=await FaceLandmarker.createFromOptions(fr,{baseOptions:{modelAssetPath:`https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task`,delegate:"GPU"},outputFaceBlendshapes:true,runningMode:"VIDEO",numFaces:1});console.log("IA Loaded");if(window.updateXPBar)window.updateXPBar();}catch(e){console.log("IA Error:",e);}};

window.toggleCam = () => {
    const b = document.getElementById('btn-cam');
    const statusDot = document.getElementById('cam-status');

    if (!window.camActiveUser) {
        // --- NOUVEAU : On lance d'abord l'expérience Gemini ---
        if (typeof window.lancerCalibrationMagique === "function") {
            window.lancerCalibrationMagique();
        }

        b.classList.add('active');
        window.camActiveUser = true;
        if (statusDot) statusDot.className = "status-dot active";
        
        // On démarre la caméra
        if (!window.webcamRunning) window.startCam(document.getElementById('webcam'), false);
        
        document.getElementById('status').innerText = "👁️ IA et Caméra Activées";
    } else {
        // Désactivation normale
        b.classList.remove('active');
        window.camActiveUser = false;
        window.webcamRunning = false;
        let v = document.getElementById('webcam');
        if (v && v.srcObject) { v.srcObject.getTracks().forEach(t => t.stop()); v.srcObject = null; }
        if (statusDot) statusDot.className = "status-dot";
        document.body.classList.remove('attention-lost');
        let hudBox = document.getElementById('hud-ia-box');
        if (hudBox) hudBox.classList.remove('distraction-hud-alert');
        document.getElementById('status').innerText = "❌ IA Désactivée";
        
        // On s'assure que l'écran magique est bien fermé
        document.getElementById('calibration-magique').style.display = 'none';
    }
};

window.simulerKaraoke=(span,dur,isFallback=false)=>{
    clearInterval(window.timerKaraoke);
    try{
        let mots=Array.from(span.querySelectorAll('.mot-cliquable'));
        if(mots.length===0)return;
        if(!dur||dur<=0||!isFinite(dur)){dur=mots.length*0.4;isFallback=true;}
        let tempsParMot=(dur*1000)/mots.length;
        let startTime=Date.now();
        let lastIndex = -1; 
        window.timerKaraoke=setInterval(()=>{
            if(window.isPaused||(!isFallback&&window.audioPlayer.paused&&!window.isReading)){
                startTime+=50;return;
            }
            let elapsed=isFallback?(Date.now()-startTime):(window.audioPlayer.currentTime*1000);
            let indexMotActuel=Math.floor(elapsed/tempsParMot);

            if(indexMotActuel !== lastIndex && indexMotActuel < mots.length){
                lastIndex = indexMotActuel;
                mots.forEach((m,i)=>{
                    if(i===indexMotActuel){
                        m.classList.add('highlight-mot');
                        if (window.isSyllabicMode) m.classList.add('loupe-active'); // NOUVEAU: La loupe !
                        const r = m.getBoundingClientRect();
                        
                        let tailleTexte = parseInt(document.getElementById('slider-taille').value) || 40;
                        let decalageBas = tailleTexte * 0.90; // 👈 CORRECTION ICI

                        document.documentElement.style.setProperty('--spot-x',(r.left+r.width/2)+'px');
                        document.documentElement.style.setProperty('--spot-y',(r.top+r.height/2 + decalageBas)+'px');
                        
                        const line = document.getElementById('focus-line');
                        if(line && line.style.display === 'block') {
                            let offsetH = line.offsetHeight || 30;
                            line.style.top = (r.top + (r.height / 2) - (offsetH / 2) + decalageBas) + "px";
                        }
                    }else{
                        m.classList.remove('highlight-mot');
                        m.classList.remove('loupe-active'); // NOUVEAU: On retire la loupe
                    }
                });
            }
        },50);
    }catch(e){console.log(e);}
};

window.jouerPhrase=(span)=>{
    if(!span)return;
    window.isReading=true;window.isPaused=false;window.audioPlayer.pause();speechSynthesis.cancel();clearInterval(window.timerKaraoke);
    document.querySelectorAll('.highlight-mot').forEach(e=>e.classList.remove('highlight-mot'));
    document.querySelectorAll('.phrase.active').forEach(e=>e.classList.remove('active'));
    
    span.classList.add('active');
    span.scrollIntoView({behavior:"smooth",block:"center"});

    const premierMot = span.querySelector('.mot-cliquable') || span;
    const rect = premierMot.getBoundingClientRect();
    
    let tailleTexte = parseInt(document.getElementById('slider-taille').value) || 40;
    let decalageBas = tailleTexte * 0.90; // 👈 CORRECTION ICI

    document.documentElement.style.setProperty('--spot-x',(rect.left+rect.width/2)+'px');
    document.documentElement.style.setProperty('--spot-y',(rect.top+rect.height/2 + decalageBas)+'px');
    
    const line = document.getElementById('focus-line');
    if(line && line.style.display === 'block') {
        let offsetH = line.offsetHeight || 30;
        line.style.top = (rect.top + (rect.height / 2) - (offsetH / 2) + decalageBas) + "px";
    }

    const motsCaches=span.querySelectorAll('.mot-cliquable.masked');
    
    if(motsCaches.length>0){
        document.getElementById('status').innerText="🤫 Chut... Mystère !";
        const tousLesMots=Array.from(span.querySelectorAll('.mot-cliquable'));
        window.jouerSequenceSpeciale(tousLesMots,0,span);
    }else{
        document.getElementById('status').innerText="Chargement...";
        // --- DEBUT DE LA CORRECTION AUDIO ---
        // On reconstruit le texte proprement sans les slashs pour la synthèse vocale
        let textePropre = "";
        span.querySelectorAll('.mot-cliquable').forEach(motSpan => {
            // Si le mot original a été sauvegardé en cache, on l'utilise, sinon on prend le texte normal
            if (motSpan.dataset.htmlOriginal) {
                let tempDiv = document.createElement('div');
                tempDiv.innerHTML = motSpan.dataset.htmlOriginal;
                textePropre += tempDiv.innerText + " ";
            } else {
                textePropre += motSpan.innerText + " ";
            }
        });
        // On enlève les symboles de respiration
        textePropre = textePropre.replace(/[🛑⏱️]/g, '').trim();
        // --- FIN DE LA CORRECTION AUDIO ---
        //google.script.run.withSuccessHandler(b64=>{
            if(!b64||b64==="ERREUR"){
                let u=new SpeechSynthesisUtterance(textePropre);
                u.lang=(window.currentLang==='fr')?'fr-FR':'ar-SA';
                u.rate=parseFloat(document.getElementById('slider-vitesse').value);
                let motsTotal=textePropre.split(" ").length;let dureeEst=motsTotal*0.4;
                u.onstart=()=>window.simulerKaraoke(span,dureeEst,true);
                let nextFired=false;
                let passerSuite=()=>{if(nextFired)return;nextFired=true;window.state.coins+=1;window.updateHud();if(window.isSequenceMode)window.passerAuSuivant();else window.stopAudio(false);};
                u.onend=passerSuite;u.onerror=passerSuite;
                setTimeout(()=>speechSynthesis.speak(u),10);
                return;
            }
            if(!window.isReading)return;
            window.audioPlayer.src="data:audio/mp3;base64,"+b64;
            window.audioPlayer.playbackRate=parseFloat(document.getElementById('slider-vitesse').value);
            window.audioPlayer.onerror=()=>{if(window.isSequenceMode)window.passerAuSuivant();};
            window.audioPlayer.onloadedmetadata=()=>{window.simulerKaraoke(span,window.audioPlayer.duration,false);window.audioPlayer.play();document.getElementById('status').innerText="Lecture...";};
            window.audioPlayer.onended=()=>{window.state.coins+=1;window.updateHud();if(window.isSequenceMode)window.passerAuSuivant();else window.stopAudio(false);};
        }).getAudioProxy(textePropre,window.currentLang);
    }
};
window.enrichirTypographie=(mot)=>{let html=mot;if(html.startsWith("ال")){html=html.replace("ال","<span class='article-defini'>ال</span>");}html=html.replace(/([\u064B-\u0650\u0652])/g,"<span class='voyelle-courte'>$1</span>");html=html.replace(/(\u0651)/g,"<span class='shadda'>$1</span>");return html;};

window.stopAudio=(reset)=>{
    try {
        window.audioPlayer.pause();
        speechSynthesis.cancel();
        clearInterval(window.timerKaraoke);
        window.isReading=false;
        window.isPaused=false;
        window.isSequenceMode=false;
        window.isCoachMode=false;
        if(typeof window.recognition!=='undefined'&&window.recognition!==null){try{window.recognition.stop();}catch(e){}}
        document.querySelectorAll('.voice-listening').forEach(el=>el.classList.remove('voice-listening','active'));
        document.querySelectorAll('.highlight-mot').forEach(e=>e.classList.remove('highlight-mot'));
        
        if(reset){
            window.idx=0;
            document.querySelectorAll('.phrase.active').forEach(e=>e.classList.remove('active'));
            if(document.getElementById('status'))document.getElementById('status').innerText="Prêt";
        }else{
            if(document.getElementById('status'))document.getElementById('status').innerText="Pause";
        }
    } catch(e) { console.log("Erreur stopAudio:", e); }
};

window.changerLecon = () => {
    try {
        window.stopAudio(true);
        window.sessionHeatmap = {};
        window.totalBlinks = 0;
        window.attentionPauses = 0;
        window.distractionBuffer = 0;
        window.framesBaillement = 0;
        window.comboCount = 0;
        if (window.state) window.state.startTime = Date.now();
        if (document.getElementById('kpi-blinks')) document.getElementById('kpi-blinks').innerText = "0";
        if (document.getElementById('kpi-distraction')) document.getElementById('kpi-distraction').innerText = "0";
        const btnDet = document.getElementById('btn-detective');
        if (btnDet) btnDet.classList.remove('active');

        let i = document.getElementById('choix-lecon').value;
        if (!window.lecons || !window.lecons[i]) return;

        let l = window.lecons[i];
        
        // --- 1. ONGLET LECTURE ---
        let zone = document.getElementById('zone-lecture');
        let imgContainer = document.getElementById('lesson-image-container');
        let imgEl = document.getElementById('lesson-img');

        if (l.imageUrl && l.imageUrl.includes("http")) {
            let finalUrl = l.imageUrl.includes("file/d/") ? "https://lh3.googleusercontent.com/d/" + l.imageUrl.split("file/d/")[1].split("/")[0] : l.imageUrl;
            imgEl.src = finalUrl;
            imgContainer.style.display = "flex";
        } else {
            imgContainer.style.display = "none";
        }

        zone.innerHTML = "";
        window.phrases = [];

        let txtBrut = l.texte || l[3] || "";
        let txt = String(txtBrut).trim();

        if (txt.length > 0) {
            let segments = txt.match(/[^.!?؟\n]+[.!?؟\n]*/g) || [txt];
            segments.forEach(seg => {
                if (seg.trim().length === 0) return;
                let span = document.createElement('span');
                span.className = "phrase";

                let motIndex = 0;
                seg.trim().split(/\s+/).forEach(w => {
                    if (w.trim() === "") return;
                    let m = document.createElement('span');
                    m.className = "mot-cliquable";

                    if (motIndex % 2 === 0) m.classList.add('mot-pair');
                    else m.classList.add('mot-impair');
                    motIndex++;

                    m.innerHTML = window.enrichirTypographie(w) + " ";
                    m.onmousedown = (e) => { if (window.isPaintActive) { e.preventDefault(); e.stopPropagation(); window.isPaintingReading = true; m.classList.toggle('masked'); } };
                    m.onmouseenter = (e) => { if (window.isPaintActive && window.isPaintingReading) { m.classList.toggle('masked'); } };
                    m.onclick = (e) => { e.stopPropagation(); if (window.isPaintActive || m.classList.contains('masked')) return; window.lireMot(w); };
                    span.appendChild(m);

                    if (w.includes('،') || w.includes(',')) {
                        let resp = document.createElement('span');
                        resp.className = 'respiration-courte';
                        resp.innerText = '⏱️';
                        span.appendChild(resp);
                    }
                });

                if (seg.includes('.') || seg.includes('?') || seg.includes('!') || seg.includes('؟') || seg.includes('\n')) {
                    let resp = document.createElement('createElement');
                    resp.className = 'respiration-longue';
                    resp.innerText = '🛑';
                    span.appendChild(resp);
                }
                span.onclick = (e) => { if (window.isPaintActive || e.target.classList.contains('masked')) return; window.stopAudio(true); window.idx = window.phrases.indexOf(span); window.jouerPhrase(span); };
                zone.appendChild(span);
                window.phrases.push(span);
            });
        }
        
        // --- 2. ONGLET COMPRÉHENSION (Conversations avec Gemini) ---
        const quizzContainer = document.getElementById('quizz-container');
        if (quizzContainer && l.q_question && l.q_question.trim() !== "") {
             quizzContainer.innerHTML = `
                <div class="quizz-question" style="text-align:right; direction:rtl; padding: 30px; background: #fff; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); max-width: 600px; margin: 0 auto;">
                    <div style="font-size: 50px; text-align: center; margin-bottom: 10px;">🤖</div>
                    <h3 style="color: var(--accent); text-align: center; font-family: 'Fredoka One', cursive; margin-bottom: 20px;">تحدث مع الذكاء الاصطناعي</h3>
                    <p style="font-weight:bold; font-size:1.5em; margin-bottom:30px; color: #333; text-align: center;">${l.q_question}</p>
                    
                    <div style="display: flex; justify-content: center;">
                        <button id="btn-repondre-ia" onclick="window.lancerEcouteGemini(\`${txtBrut.replace(/`/g, "'")}\`, \`${l.q_question.replace(/`/g, "'")}\`)" style="background: linear-gradient(45deg, #0984e3, #6c5ce7); color:white; border:none; padding: 15px 40px; font-size: 1.5em; border-radius: 50px; cursor: pointer; box-shadow: 0 4px 15px rgba(108, 92, 231, 0.4); display: flex; align-items: center; gap: 15px; transition: all 0.3s;">
                            🎤 اضغط وأجب بصوتك
                        </button>
                    </div>
                    <p id="msg-gemini-retour" style="font-size: 1.2em; font-weight: bold; margin-top: 25px; text-align: center; min-height: 50px; line-height: 1.5;"></p>
                </div>
            `;
        } else if (quizzContainer) {
            quizzContainer.innerHTML = "<p>لا يوجد سؤال لهذا الدرس.</p>";
        }

        // --- 3. ONGLET MATHS (Exercice de Concentration) ---
        window.genererExerciceMaths();

        document.getElementById('progress-bar').style.width = "0%";
        document.getElementById('status').innerText = "Prêt";
        let slider = document.getElementById('slider-spacing');
        if (slider && slider.value > 0) window.updateLetterSpacing(slider.value);
        
        // S'assurer qu'on affiche l'onglet lecture par défaut quand on change de leçon
        let btnLecture = document.querySelector('.lunoo-tabs .tab-btn:first-child');
        if(btnLecture) window.changerOnglet('tab-lecture', btnLecture);

    } catch (err) { console.log("Erreur chargement leçon :", err); }
};

// Fonction pour générer un petit exercice de calcul mental aléatoire
window.genererExerciceMaths = () => {
    const mathContainer = document.getElementById('tab-math');
    if (!mathContainer) return;
    
    // On génère des nombres simples (entre 1 et 10)
    let num1 = Math.floor(Math.random() * 10) + 1;
    let num2 = Math.floor(Math.random() * 10) + 1;
    // On s'assure que le résultat d'une soustraction ne soit pas négatif
    if (num1 < num2) { let temp = num1; num1 = num2; num2 = temp; }
    
    const operations = ['+', '-'];
    let op = operations[Math.floor(Math.random() * operations.length)];
    let reponseCorrecte = (op === '+') ? (num1 + num2) : (num1 - num2);
    
    // On crée 3 choix (dont 1 correct)
    let choix = [reponseCorrecte];
    while(choix.length < 3) {
        let fauxChoix = reponseCorrecte + Math.floor(Math.random() * 5) - 2;
        if (fauxChoix !== reponseCorrecte && fauxChoix >= 0 && !choix.includes(fauxChoix)) {
            choix.push(fauxChoix);
        }
    }
    // On mélange les choix
    choix.sort(() => Math.random() - 0.5);

    let htmlChoix = choix.map(c => `

window.jouerPhrase=(span)=>{
    if(!span)return;
    window.isReading=true;window.isPaused=false;window.audioPlayer.pause();speechSynthesis.cancel();clearInterval(window.timerKaraoke);
    document.querySelectorAll('.highlight-mot').forEach(e=>e.classList.remove('highlight-mot'));
    document.querySelectorAll('.phrase.active').forEach(e=>e.classList.remove('active'));
    
    span.classList.add('active');
    span.scrollIntoView({behavior:"smooth",block:"center"});

    const premierMot = span.querySelector('.mot-cliquable') || span;
    const rect = premierMot.getBoundingClientRect();
    
    let tailleTexte = parseInt(document.getElementById('slider-taille').value) || 40;
    let decalageBas = tailleTexte * 0.90; // 👈 CORRECTION ICI

    document.documentElement.style.setProperty('--spot-x',(rect.left+rect.width/2)+'px');
    document.documentElement.style.setProperty('--spot-y',(rect.top+rect.height/2 + decalageBas)+'px');
    
    const line = document.getElementById('focus-line');
    if(line && line.style.display === 'block') {
        let offsetH = line.offsetHeight || 30;
        line.style.top = (rect.top + (rect.height / 2) - (offsetH / 2) + decalageBas) + "px";
    }

    const motsCaches=span.querySelectorAll('.mot-cliquable.masked');
    
    if(motsCaches.length>0){
        document.getElementById('status').innerText="🤫 Chut... Mystère !";
        const tousLesMots=Array.from(span.querySelectorAll('.mot-cliquable'));
        window.jouerSequenceSpeciale(tousLesMots,0,span);
    }else{
        document.getElementById('status').innerText="Chargement...";
        // On nettoie les symboles ET les slashs du mode syllabe avant d'envoyer à la voix
        let textePropre = span.innerText.replace(/[🛑⏱️\/]/g, '').replace(/\s+/g, ' ').trim();
        ////google.script.run.withSuccessHandler(b64=>{
            if(!b64||b64==="ERREUR"){

                u.onstart=()=>window.simulerKaraoke(span,dureeEst,true);
                let nextFired=false;
                let passerSuite=()=>{if(nextFired)return;nextFired=true;window.state.coins+=1;window.updateHud();if(window.isSequenceMode)window.passerAuSuivant();else window.stopAudio(false);};
                u.onend=passerSuite;u.onerror=passerSuite;
                setTimeout(()=>speechSynthesis.speak(u),10);
                return;
            }

            window.audioPlayer.src="data:audio/mp3;base64,"+b64;
            window.audioPlayer.playbackRate=parseFloat(document.getElementById('slider-vitesse').value);

            window.audioPlayer.onended=()=>{window.state.coins+=1;window.updateHud();if(window.isSequenceMode)window.passerAuSuivant();else window.stopAudio(false);};
        }).getAudioProxy(textePropre,window.currentLang);
    }
};

window.startCoachIA=()=>{
    if(!window.phrases||window.phrases.length===0){alert("Sélectionne d'abord une leçon !");return;}
    speechSynthesis.cancel();
    window.audioPlayer.pause();
    window.isReading=true;
    window.isCoachMode=true; 
    let phraseActive=window.phrases[window.idx];
    if(!phraseActive){ window.finishSession(); return; }
    document.querySelectorAll('.phrase.active').forEach(e=>e.classList.remove('active'));
    phraseActive.classList.add('active');
    phraseActive.scrollIntoView({behavior:"smooth",block:"center"});
    let motsElements=phraseActive.querySelectorAll('.mot-cliquable');
    let texteCible=Array.from(motsElements).map(el=>el.innerText.replace(/[🛑⏱️]/g,'').trim()).join(' ');
    const btn=document.querySelector('button[onclick="window.startCoachIA()"]');
    if(btn)btn.classList.add('active');
    document.getElementById('status').innerText="🤖 Le Coach te parle...";
    if(window.idx === 0) {
        let introText=window.currentLang==='ar'?"مرحباً يا بطل! استمع جيداً ثم اقرأ معي.":"Bonjour ! Écoute bien, puis répète.";
        let utteranceIntro=new SpeechSynthesisUtterance(introText);
        utteranceIntro.lang=window.currentLang==='ar'?'ar-SA':'fr-FR';
        utteranceIntro.rate=0.9;
        speechSynthesis.speak(utteranceIntro);
        setTimeout(()=>{ if(window.isCoachMode) window.lancerVoixCoach(texteCible, phraseActive, btn); }, 3500);
    } else {
        setTimeout(()=>{ if(window.isCoachMode) window.lancerVoixCoach(texteCible, phraseActive, btn); }, 1000);
    }
};

window.lancerVoixCoach=(texteCible, phraseActive, btn)=>{
    if(!window.isCoachMode) return;
    //google.script.run.withSuccessHandler(b64=>{
        if(!window.isCoachMode) return;
        if(b64 && b64 !== "ERREUR"){
            window.audioPlayer.src = "data:audio/mp3;base64," + b64;
            window.audioPlayer.playbackRate = parseFloat(document.getElementById('slider-vitesse').value);
            if(!window.isPaused) { window.audioPlayer.play().catch(e=>{}); }
            window.audioPlayer.onended = () => window.activerMicroPourCoach(phraseActive, texteCible, btn);
        } else {
            let uttPhrase=new SpeechSynthesisUtterance(texteCible);
            uttPhrase.lang=window.currentLang==='ar'?'ar-SA':'fr-FR';
            speechSynthesis.speak(uttPhrase);
            let dureeEstimee = (texteCible.split(' ').length * 600) + 1000;
            setTimeout(()=> { if(window.isCoachMode) window.activerMicroPourCoach(phraseActive,texteCible,btn); }, dureeEstimee);
        }
    }).getAudioProxy(texteCible,window.currentLang);
};

window.activerMicroPourCoach=(phraseActive,texteCible,btn)=>{
    if(!window.isCoachMode) return;
    if(!('webkitSpeechRecognition' in window)){alert("Ton navigateur ne supporte pas le micro.");if(btn)btn.classList.remove('active');return;}
    window.recognition=new webkitSpeechRecognition();
    window.recognition.lang=window.currentLang==='ar'?'ar-SA':'fr-FR';
    window.recognition.interimResults=false;
    window.recognition.maxAlternatives=1;
    if(btn)btn.classList.add('voice-listening');
    document.getElementById('status').innerText="🎤 À ton tour ! Parle maintenant.";
    window.recognition.onresult=(event)=>{
        if(!window.isCoachMode) return;
        let texteEntendu=event.results[0][0].transcript.trim();
        
        // 🧠 INTÉGRATION DE L'IA ANTI-DYSLEXIE
        if (window.detecterInversion(texteCible, texteEntendu)) {
            phraseActive.classList.add('echo-fail');
            document.getElementById('status').innerText="🔄 Attention, tu as inversé des lettres ! Regarde bien l'ordre.";
            let msg = window.currentLang === 'ar' ? "انتبه، لقد عكست بعض الحروف!" : "Attention, tu as inversé des lettres !";
            let utt = new SpeechSynthesisUtterance(msg);
            utt.lang = window.currentLang === 'ar' ? 'ar-SA' : 'fr-FR';
            speechSynthesis.speak(utt);
            setTimeout(()=>{
                phraseActive.classList.remove('echo-fail');
                if(window.isCoachMode) window.activerMicroPourCoach(phraseActive, texteCible, btn);
            }, 3500);
            return;
        }

        let score=window.calculerSimilitude(texteEntendu,texteCible);
        if(score>40){
            phraseActive.classList.add('echo-success');
            document.getElementById('status').innerText="✅ Excellent ! ("+Math.round(score)+"%)";
            let msg=window.currentLang==='ar'?"أحسنت!":"Bravo !";
            let uttBravo=new SpeechSynthesisUtterance(msg);
            uttBravo.lang=window.currentLang==='ar'?'ar-SA':'fr-FR';
            speechSynthesis.speak(uttBravo);
            if(typeof confetti!=="undefined")confetti({particleCount:50,spread:40});
            window.state.coins+=10; window.updateHud();
            setTimeout(()=>{
                phraseActive.classList.remove('echo-success');
                if(!window.isCoachMode) return;
                window.idx++; window.startCoachIA(); 
            }, 2500);
        }else{
            phraseActive.classList.add('echo-fail');
            document.getElementById('status').innerText="⚠️ Presque ! ("+Math.round(score)+"%)";
            let msg=window.currentLang==='ar'?"حاول مرة أخرى.":"Presque ! Essaie encore.";
            let uttEffort=new SpeechSynthesisUtterance(msg);
            uttEffort.lang=window.currentLang==='ar'?'ar-SA':'fr-FR';
            speechSynthesis.speak(uttEffort);
            setTimeout(()=>{
                phraseActive.classList.remove('echo-fail');
                if(window.isCoachMode) window.activerMicroPourCoach(phraseActive,texteCible,btn);
            }, 2500);
        }
    };
    window.recognition.onend=()=>{if(btn){btn.classList.remove('voice-listening');}if(document.getElementById('status').innerText==="🎤 À ton tour ! Parle maintenant."){document.getElementById('status').innerText="😴 Je n'ai rien entendu... Clique sur le micro pour réessayer.";}};
    window.recognition.onerror=(event)=>{if(event.error==='aborted')return;if(btn){btn.classList.remove('voice-listening');}if(event.error==='not-allowed'){document.getElementById('status').innerText="❌ Micro bloqué !";}else{document.getElementById('status').innerText="❌ Erreur micro.";}};
    try { window.recognition.start(); } catch(e){}
};

window.lancerModeEcho=()=>{let phraseActive=document.querySelector('.phrase.active');if(!phraseActive){alert("Sélectionne d'abord une phrase en cliquant dessus !");return;}window.stopAudio(false);const btn=document.getElementById('btn-echo');btn.classList.add('voice-listening');document.getElementById('status').innerText="👂 Écoute...";if(!('webkitSpeechRecognition' in window)){alert("Micro non supporté sur ce navigateur (utilisez Chrome).");return;}window.recognition=new webkitSpeechRecognition();window.recognition.lang=window.currentLang==='ar'?'ar-SA':'fr-FR';window.recognition.interimResults=false;window.recognition.maxAlternatives=1;window.recognition.onresult=(event)=>{let texteEntendu=event.results[0][0].transcript;let texteCible=phraseActive.innerText.replace(/[🛑⏱️]/g,'');let score=window.calculerSimilitude(texteEntendu,texteCible);if(score>40){phraseActive.classList.add('echo-success');document.getElementById('status').innerText="✅ Bravo ! ("+Math.round(score)+"%)";if(typeof confetti!=='undefined')confetti({particleCount:50,spread:40,origin:{y:0.7}});window.state.coins+=5;window.updateHud();setTimeout(()=>phraseActive.classList.remove('echo-success'),3000);}else{phraseActive.classList.add('echo-fail');document.getElementById('status').innerText="⚠️ Essaie encore...";setTimeout(()=>phraseActive.classList.remove('echo-fail'),3000);}};window.recognition.onspeechend=()=>{window.recognition.stop();btn.classList.remove('voice-listening');};window.recognition.onerror=()=>{btn.classList.remove('voice-listening');document.getElementById('status').innerText="Erreur Micro";};window.recognition.start();};
window.toggleVoiceControl=()=>{
    const btn=document.getElementById('btn-voice');
    if(!('webkitSpeechRecognition' in window)){alert("Navigateur incompatible avec la commande vocale.");return;}
    if(window.isVoiceActive){
        window.isVoiceActive=false;
        if(window.recognition)window.recognition.stop();
        btn.classList.remove('voice-listening');
        document.getElementById('status').innerText="🗣️ Vocal OFF";
    }else{
        window.recognition=new webkitSpeechRecognition();
        window.recognition.continuous=true;
        window.recognition.interimResults=false;
        window.recognition.lang = window.currentLang === 'ar' ? 'ar-TN' : 'fr-FR';
        window.recognition.onstart=()=>{
            window.isVoiceActive=true;
            btn.classList.add('voice-listening');
            document.getElementById('status').innerText="🗣️ J'écoute tes commandes...";
        };
        window.recognition.onresult=(e)=>{
            const cmd = e.results[e.results.length-1][0].transcript.trim().toLowerCase();
            const contient = (mots) => mots.some(mot => cmd.includes(mot));
            
            if(contient(['leçon suivante', 'chapitre suivant', 'الدرس التالي', 'الدرس الجاي', 'اللي بعده'])){
                let select = document.getElementById('choix-lecon');
                if(select.selectedIndex < select.options.length - 1) {
                    select.selectedIndex++;
                    window.changerLecon();
                    document.getElementById('status').innerText="📚 Leçon suivante";
                } else { document.getElementById('status').innerText="❌ C'est la dernière leçon !"; }
            }
            else if(contient(['leçon précédente', 'chapitre précédent', 'الدرس السابق', 'الدرس اللي فات', 'درس فات'])){
                let select = document.getElementById('choix-lecon');
                if(select.selectedIndex > 0) {
                    select.selectedIndex--;
                    window.changerLecon();
                    document.getElementById('status').innerText="📚 Leçon précédente";
                } else { document.getElementById('status').innerText="❌ C'est la première leçon !"; }
            }
            else if(contient(['اقرا', 'أقرا', 'ابدأ', 'ابدا', 'lis', 'commence', 'play', 'خدم', 'تمشي'])){
                window.lireTout();
            }
            else if(contient(['توقف', 'stop', 'arrête', 'arrete', 'قص', 'يزي', 'حبس', 'يكفي'])){
                window.stopAudio(true);
            }
            else if(contient(['pause', 'لحظة', 'انتظر', 'استنى', 'أستنى', 'اصبر'])){
                window.stopAudio(false);
            }
            else if(contient(['تالي', 'suivant', 'après', 'كمل', 'تقديم', 'واصل', 'زيد'])){
                window.passerAuSuivant();
            }
            else if(contient(['سابق', 'رجوع', 'précédent', 'retour', 'ارجع', 'عاود'])){
                window.stopAudio(false);
                if(window.idx > 0) {
                    window.idx--;
                    if(window.phrases[window.idx]) window.jouerPhrase(window.phrases[window.idx]);
                }
            }
            else if(contient(['doucement', 'lentement', 'بطيء', 'ببطء', 'بالشوية', 'بشوية', 'نقص'])){
                let slider = document.getElementById('slider-vitesse');
                let newSpeed = Math.max(0.5, parseFloat(slider.value) - 0.2);
                slider.value = newSpeed;
                window.updateSpeed(newSpeed);
                document.getElementById('status').innerText="🐢 Vitesse réduite";
            }
            else if(contient(['vite', 'rapide', 'أسرع', 'اسرع', 'بسرعة', 'فيسع', 'زرب', 'ازرب'])){
                let slider = document.getElementById('slider-vitesse');
                let newSpeed = Math.min(1.5, parseFloat(slider.value) + 0.2);
                slider.value = newSpeed;
                window.updateSpeed(newSpeed);
                document.getElementById('status').innerText="🐇 Vitesse augmentée";
            }
            else if(contient(['quitter', 'accueil', 'خروج', 'الرئيسية', 'اخرج', 'سكر'])){
                window.goHome();
            }
        };
        window.recognition.onend=()=>{
            if(window.isVoiceActive){
                setTimeout(()=>{try{window.recognition.start();}catch(err){}},300);
            }
        };
        try{window.recognition.start();}catch(err){}
    }
};

window.modeDetective=()=>{
    const btn=document.getElementById('btn-detective');
    if(document.querySelector('.input-trou') || (btn && btn.classList.contains('active'))){
        if(btn) btn.classList.remove('active');
        window.changerLecon(); 
        document.getElementById('status').innerText="Prêt";
        return; 
    }
    if(btn) btn.classList.add('active');
    const phrases=document.querySelectorAll('.phrase');
    let trousCrees=0;
    phrases.forEach(phrase=>{
        const mots=phrase.querySelectorAll('.mot-cliquable');
        mots.forEach(motSpan=>{
            const texteMot=motSpan.innerText.replace(/[🛑⏱️]/g,'').trim();
            if(texteMot.length>2 && Math.random()<0.15){
                const reponseAttendue=texteMot;
                const input=document.createElement('input');
                input.type="text";
                input.className="input-trou";
                input.placeholder="?";
                input.autocomplete="off";
                input.onclick=(e)=>e.stopPropagation();
                input.oninput=(e)=>{
                    let valeurSaisie=e.target.value.trim();
                    if(valeurSaisie.toLowerCase()===reponseAttendue.toLowerCase()){
                        e.target.classList.remove('error');
                        e.target.classList.add('success');
                        e.target.disabled=true;
                        if(typeof confetti!=="undefined")confetti({particleCount:30,spread:50,origin:{x:e.target.getBoundingClientRect().left/window.innerWidth,y:e.target.getBoundingClientRect().top/window.innerHeight}});
                        try{document.getElementById('sfx-win').cloneNode(true).play();}catch(err){}
                        window.state.coins+=5; window.updateHud(); window.verifierFinDetective();
                    }else{
                        e.target.classList.remove('error');
                    }
                };
                input.onblur=(e)=>{if(!e.target.disabled && e.target.value!==""){e.target.classList.add('error');}};
                motSpan.innerHTML="";
                motSpan.appendChild(input);
                trousCrees++;
            }
        });
    });
    if(trousCrees>0){ document.getElementById('status').innerText=`🕵️‍♂️ Mission : Trouve les ${trousCrees} mots cachés !`;
    }else{ if(btn) btn.classList.remove('active'); window.changerLecon(); alert("Pas de chance au tirage, réessaie !"); }
};

window.onload=()=>{
    // 💡 NOUVEAU : Vérifier si c'est la première visite
    if(!localStorage.getItem('lunoo_deja_visite')) {
        document.getElementById('welcome-prof-modal').style.display = 'flex';
    }

    window.loadSettings();
    window.renderShop();
    window.loadIA();
    window.makeElementDraggable(document.getElementById('left-menu'));
    window.makeElementDraggable(document.getElementById('right-menu'));
    document.getElementById('login-msg').innerText="Chargement sécurisé...";
    
    //google.script.run.withSuccessHandler(data=>{
        window.listeUtilisateurs=data||[];
        document.getElementById('login-msg').innerText="";
    }).withFailureHandler(err=>{
        document.getElementById('login-msg').innerText="Erreur de connexion réseau.";
        document.getElementById('login-msg').style.color="red";
    }).getTousLesUtilisateurs();
    
    let mouseReq=null;
    
    // 📏 CORRECTION : GESTION DE LA SOURIS SÉPARÉE
    document.addEventListener('mousemove',(e)=>{
        // Mouvement des yeux de la mascotte
        document.querySelectorAll('.pupil').forEach(p=>{
            const rect=p.getBoundingClientRect();
            const dx=(e.clientX-rect.left-rect.width/2)/40;
            const dy=(e.clientY-rect.top-rect.height/2)/40;
            p.style.transform=`translate(${Math.max(-5,Math.min(5,dx))}px, ${Math.max(-5,Math.min(5,dy))}px)`;
        });

        // Seulement si on ne lit pas en automatique
        if(!mouseReq && !window.isReading){
            mouseReq=requestAnimationFrame(()=>{
                const isTunnel = document.body.classList.contains('tunnel-active');
                const line = document.getElementById('focus-line');
                const isFocusLine = line && line.style.display === 'block';

                // Si l'outil n'est pas épinglé par un clic
                if(!window.isRulerFixed && (isTunnel || isFocusLine)) {
                    const zoneLecture = document.getElementById('zone-lecture');
                    if(zoneLecture) {
                        const rect = zoneLecture.getBoundingClientRect();
                        
                        // Empêche de dépasser en haut et en bas du texte
                        let clampedY = e.clientY;
                        if(clampedY < rect.top) clampedY = rect.top;
                        if(clampedY > rect.bottom) clampedY = rect.bottom;
                        
                        // Si le mode torche (tunnel) est actif
                        if(isTunnel) {
                            document.documentElement.style.setProperty('--spot-x', (rect.left + rect.width / 2) + 'px');
                            document.documentElement.style.setProperty('--spot-y', clampedY + 'px');
                        }
                        
                        // Si la règle de lecture est active
                        if(isFocusLine) {
                            // On centre la ligne sur la hauteur de la souris
                            let offsetH = line.offsetHeight || 30;
                            line.style.top = (clampedY - (offsetH / 2)) + "px"; 
                            line.style.left = rect.left + "px";
                            line.style.width = rect.width + "px";
                        }
                    }
                }
                mouseReq=null;
            });
        }
        
        // Mode Cinéma
        if(window.isCinemaMode){
            document.body.classList.add('ui-visible');
            clearTimeout(window.cinemaTimer);
            window.cinemaTimer=setTimeout(()=>{
                document.body.classList.remove('ui-visible');
            },3000);
        }
    });
};
window.togglePunctuation = () => { 
    document.body.classList.toggle('hide-punctuation'); 
    const btn = document.getElementById('btn-punctuation'); 
    if (btn) btn.classList.toggle('active'); 
};
// Fonction pour fermer le message de bienvenue et s'en souvenir
window.closeWelcomeModal = () => {
    document.getElementById('welcome-prof-modal').style.display = 'none';
    localStorage.setItem('lunoo_deja_visite', 'oui'); // On enregistre la visite dans le navigateur
};
window.changerOnglet = (idOngletCible, btnElement) => {
    // 1. Cacher tous les contenus
    document.querySelectorAll('.tab-content').forEach(tab => {
        tab.style.display = 'none';
    });
    // 2. Désactiver tous les boutons
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.style.background = '#eee';
        btn.style.color = '#333';
        btn.style.fontWeight = 'normal';
    });
    // 3. Afficher l'onglet cible et activer le bouton
    document.getElementById(idOngletCible).style.display = 'block';
    btnElement.style.background = 'var(--accent)';
    btnElement.style.color = 'white';
    btnElement.style.fontWeight = 'bold';
    
    // Si on quitte la lecture, on met en pause
    if(idOngletCible !== 'tab-lecture') {
        window.stopAudio(false);
    }
};
// Fonction pour le Mode Cinéma
window.toggleCinemaMode = () => {
    window.isCinemaMode = !window.isCinemaMode;
    if(window.isCinemaMode){
        document.body.classList.add('cinema-mode');
        if(document.documentElement.requestFullscreen) document.documentElement.requestFullscreen().catch(e=>{});
    } else {
        document.body.classList.remove('cinema-mode', 'ui-visible');
        if(document.exitFullscreen && document.fullscreenElement) document.exitFullscreen();
    }
};
// Fonction pour lancer le micro et parler à Gemini
window.lancerEcouteGemini = (texteLecon, question) => {
    const btn = document.getElementById('btn-repondre-ia');
    const msgRetour = document.getElementById('msg-gemini-retour');
    
    if(!('webkitSpeechRecognition' in window)){
        alert("متصفحك لا يدعم الميكروفون. يرجى استخدام Google Chrome!");
        return;
    }

    window.stopAudio(true); // Coupe toute lecture en cours
    
    window.recognition = new webkitSpeechRecognition();
    window.recognition.lang = window.currentLang === 'ar' ? 'ar-SA' : 'fr-FR';
    window.recognition.interimResults = false;
    
    // Animation du bouton pendant l'écoute
    btn.style.transform = "scale(1.05)";
    btn.style.background = "#d63033"; 
    btn.innerHTML = "👂 أنا أستمع... (Parle maintenant)";
    msgRetour.innerText = "";
    msgRetour.style.color = "#333";

    window.recognition.onresult = (event) => {
        let reponseEnfant = event.results[0][0].transcript.trim();
        
        // Animation pendant que Gemini réfléchit
        btn.style.background = "#fdcb6e"; 
        btn.innerHTML = "🤔 أفكر... (Gemini réfléchit)";
        btn.style.transform = "scale(1)";
        
        // On envoie la réponse à Gemini via Google Apps Script
        //google.script.run.withSuccessHandler(resultatGemini => {
            // Rétablissement du bouton
            btn.style.background = "linear-gradient(45deg, #0984e3, #6c5ce7)"; 
            btn.innerHTML = "🎤 اضغط وأجب بصوتك";
            
            // Affichage du retour de l'IA
            msgRetour.innerText = resultatGemini.message;
            
            if (resultatGemini.correct) {
                msgRetour.style.color = "var(--success)";
                if (typeof confetti !== "undefined") confetti({ particleCount: 150, spread: 80, origin: { y: 0.6 } });
                try { document.getElementById('sfx-win').play(); } catch (e) {}
                window.state.coins += 30; // Gros bonus pour l'effort vocal !
                window.updateHud();
            } else {
                msgRetour.style.color = "var(--error)";
                try { document.getElementById('sfx-fail').play(); } catch (e) {}
            }

            // L'IA lit sa propre réponse à voix haute
            let u = new SpeechSynthesisUtterance(resultatGemini.message);
            u.lang = 'ar-SA';
            speechSynthesis.speak(u);

        }).evaluerReponseGemini(texteLecon, question, reponseEnfant);
    };

    window.recognition.onerror = (e) => {
        btn.style.background = "linear-gradient(45deg, #0984e3, #6c5ce7)";
        btn.innerHTML = "🎤 اضغط وأجب بصوتك";
        msgRetour.innerText = "❌ لم أسمعك جيداً (Erreur micro)";
    };

    window.recognition.start();
};

window.lancerCreationHistoire = () => {

    const btn = document.getElementById('btn-generer-histoire');

    // Appel du Backend
    //google.script.run.withSuccessHandler(res => {
        btn.innerHTML = "🪄 Créer l'histoire !";
        btn.disabled = false;
        
        if(res.erreur) {

            return;
        }
        
        // Fermer la fenêtre
        document.getElementById('fabrique-modal').style.display = 'none';
        document.getElementById('input-mots-cles').value = ''; // On vide le champ
        
        // On crée la nouvelle leçon avec l'histoire de Gemini

};
